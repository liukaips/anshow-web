x-backend-environment: &backend-environment
  NODE_ENV: production
  SITE_URL: ${SITE_URL:?Set SITE_URL in .env}
  SITE_HOST: ${SITE_HOST:?Set SITE_HOST in .env}
  DATABASE_PATH: /data/anshow.db
  BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
  RATE_LIMIT_SECRET: ${RATE_LIMIT_SECRET:?Set RATE_LIMIT_SECRET in .env}
  MEDIA_DRIVER: ${MEDIA_DRIVER:-local}
  COS_BUCKET: ${COS_BUCKET:-}
  COS_REGION: ${COS_REGION:-}
  COS_PUBLIC_BASE_URL: ${COS_PUBLIC_BASE_URL:-}
  COS_SECRET_ID: ${COS_SECRET_ID:-}
  COS_SECRET_KEY: ${COS_SECRET_KEY:-}
  BACKUP_DIR: /data/backups
  BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY:-}
  BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  SMTP_FROM: ${SMTP_FROM:-}
  SALES_EMAIL: ${SALES_EMAIL:-}
  TRANSLATION_API_URL: ${TRANSLATION_API_URL:-}
  TRANSLATION_API_KEY: ${TRANSLATION_API_KEY:-}
  TRANSLATION_MODEL: ${TRANSLATION_MODEL:-}
  PORT: 4000

services:
  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: anshow-backend:${ANSHOW_IMAGE_TAG:-local}
    init: true
    restart: "no"
    command: ["node", "backend/dist/db/migrate.js"]
    environment: *backend-environment
    volumes:
      - app-data:/data
      - backups:/data/backups

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: anshow-backend:${ANSHOW_IMAGE_TAG:-local}
    init: true
    restart: unless-stopped
    environment: *backend-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - app-data:/data
      - media:/media
      - backups:/data/backups
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/api/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  worker:
    image: anshow-backend:${ANSHOW_IMAGE_TAG:-local}
    init: true
    restart: unless-stopped
    command: ["node", "backend/dist/worker/index.js"]
    environment: *backend-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - app-data:/data
      - media:/media
      - backups:/data/backups

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: anshow-frontend:${ANSHOW_IMAGE_TAG:-local}
    init: true
    restart: unless-stopped
    environment:
      BACKEND_INTERNAL_URL: http://backend:4000
      SITE_URL: ${SITE_URL:?Set SITE_URL in .env}
    depends_on:
      backend:
        condition: service_healthy
      worker:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/en').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  caddy:
    build:
      context: .
      dockerfile: deploy/caddy/Dockerfile
    image: anshow-caddy:${ANSHOW_IMAGE_TAG:-local}
    init: true
    restart: unless-stopped
    environment:
      ACME_EMAIL: ${ACME_EMAIL:?Set ACME_EMAIL in .env}
      SITE_HOST: ${SITE_HOST:?Set SITE_HOST in .env}
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - media:/srv/media:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  app-data:
    name: anshow-app-data
  media:
    name: anshow-media
  caddy-data:
    name: anshow-caddy-data
  caddy-config:
    name: anshow-caddy-config
  backups:
    name: anshow-backups
